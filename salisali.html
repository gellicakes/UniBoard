<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>UniBoard</title>

	<style>
		:root {
  --primary: #1d2d44;
  --secondary: #95b8d1;
  --accent: #00cec9;
  --light: #f8f9fa;
  --dark: #2d3436;
  --text: #636e72;
  --today: #fd79a8;
  --selected: #a29bfe;
  --event-panel-bg: #f8f9fa;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f3f3f3;
}

.header {
  background: #142d4c;
  color: white;
  padding: 20px;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 1000;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.header h1 {
  margin: 0;
}

.header p {
  margin: 0;
}

.nav {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}

.nav button {
  background: #2f4b7c;
  border: none;
  color: white;
  padding: 8px 15px;
  margin-right: 5px;
  border-radius: 8px;
  cursor: pointer;
}

.containers-header {
  padding: 20px;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto 10px auto;
  background: transparent;
  border-radius: 0;
  box-shadow: none;
}

.containers-header p {
  margin-top: 0px;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.top-bar h1 {
  margin: 0;
}

.add-btn {
  background: #3e5c76;
  color: white;
  padding: 8px 15px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.containers {
  display: flex;
  flex-direction: row;     
  justify-content: center; 
  align-items: flex-start;
  gap: 30px;
  max-width: 1000px;
  width: 100%;
  margin: 0 auto 20px auto;
}

.calendar-container {
  background: white;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
  width: 100%;
  max-width: 400px;
  overflow: hidden;
  transform-style: preserve-3d;
  perspective: 1000px;
  transition: all 0.3s ease;
}

.calendar-container:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
}

.calendar-header {
  background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
  color: white;
  padding: 1.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.calendar-header::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
  transform: rotate(30deg);
}

.month-year {
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
  position: relative;
}

.nav-buttons {
  display: flex;
  justify-content: space-between;
  position: absolute;
  width: 100%;
  top: 50%;
  left: 0;
  transform: translateY(-50%);
  padding: 0 1rem;
  z-index: 1;
}

.nav-btn {
  background: rgba(255, 255, 255, 0.2);
  color: white;
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-btn:hover {
  background: rgba(255, 255, 255, 0.3);
  transform: scale(1.1);
}

.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 0.5rem 1rem;
  background: rgba(74, 107, 223, 0.1);
  font-weight: 600;
  color: var(--primary);
}

.weekday {
  text-align: center;
  padding: 0.5rem;
  font-size: 0.9rem;
}

.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  padding: 1rem;
}

.day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  font-weight: 500;
  color: var(--dark);
}

.day:hover {
  background: rgba(74, 107, 223, 0.1);
  transform: scale(1.1);
}

.day.today {
  background: var(--today);
  color: white;
  font-weight: bold;
}

.day.selected {
  background: var(--selected);
  color: white;
  font-weight: bold;
  animation: pop 0.3s ease;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.day.other-month {
  color: var(--text);
  opacity: 0.5;
}

.day.has-events::after {
  content: "♥";
  font-size: 15px;
  color: #ff4d6d;
  opacity: 0.9;
}

.calendar-footer {
  padding: 1rem;
  text-align: center;
  border-top: 1px solid rgba(0, 0, 0, 0.1);
  display: flex;
  justify-content: space-between;
}

.today-btn {
  background: #95b8d1;
  color: white;
  border: none;
  padding: 0.5rem 1rem;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-weight: 500;
}

.today-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0, 206, 201, 0.3);
}

.event-indicator {
  font-size: 0.8rem;
  color: #95b8d1;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* Event Panel Styles */
.event-panel {
  background: white;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
  padding: 1.5rem;
  width: 100%;
  max-width: 450px;
  height: fit-content;
}

.event-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
  padding-bottom: 1rem;
  border-bottom: 2px solid rgba(74, 107, 223, 0.2);
}

.event-date {
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--primary);
}

.event-list {
  max-height: 350px;
  overflow-y: auto;
}

.event-item {
  padding: 1rem;
  margin-bottom: 0.8rem;
  background: var(--event-panel-bg);
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
  transition: transform 0.2s ease;
}

.event-item:hover {
  transform: translateX(5px);
}

.event-color {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

.event-time {
  font-weight: 600;
  color: var(--primary);
  min-width: 80px;
}

.event-text {
  flex: 1;
}

.no-events {
  text-align: center;
  color: var(--text);
  padding: 2rem 1rem;
  font-style: italic;
}

.event-icon {
  font-size: 1.2rem;
  color: var(--accent);
  margin-right: 10px;
}

@media (max-width: 767px) {
  .containers {
    gap: 15px;
  }

  .calendar-container, .event-panel{
    width: 100%;
    margin: 400px;
  }
  
  .event-panel {
    max-width: 400px;
  }
  
  .event-date {
    font-size: 1.3rem;
  }
}

.event-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.delete-btn {
  opacity: 0;
  transition: 0.2s;
  background: #8da9c4;
}

.open-btn {
  transition: 0.2s;
  background: #8da9c4;
}

.event-item:hover .delete-btn {
  opacity: 1;
}
</style>
</head>

<body>
	<div class="header">
	  		<h1>UniBoard</h1>
	  		<p>College of Computing Studies</p>
	  		<div class="nav">
	    		<button>Department</button>
	    		<button>Program</button>
	    		<button>Section</button>
	  		</div>
		</div>

		<div class="containers-header">
 			<div class="top-bar">
	    		<h1 style="color: #5e6472;">Section Announcement</h1>
    			<button id="addBtn" class="add-btn">Add Post</button>
  			</div>
				<p style="color: #919191;">
    				Quizzes, activities, projects, and exams for your section
  				</p>
		</div>

		<div class="containers">
			<div class="calendar-container">
				<div class="calendar-header">
					<div class="nav-buttons">
						<button class="nav-btn" id="prev-month">
							<i class="fas fa-chevron-left"></i>
						</button>
						<button class="nav-btn" id="next-month">
							<i class="fas fa-chevron-right"></i>
						</button>
					</div>

					<div class="month-year" id="month-year"></div>

				</div>

				<div class="weekdays">
					<div class="weekday">Sun</div>
					<div class="weekday">Mon</div>
					<div class="weekday">Tue</div>
					<div class="weekday">Wed</div>
					<div class="weekday">Thu</div>
					<div class="weekday">Fri</div>
					<div class="weekday">Sat</div>
				</div>

				<div class="days" id="days"></div>

				<div class="calendar-footer">
					<button class="today-btn" id="today-btn">
						<i class="fas fa-calendar-day"></i> Today
					</button>

					<div class="event-indicator">
						<i class="fas fa-heart"></i>
						<span>Has events</span>
					</div>
				</div>
			</div>

			<div class="event-panel" id="event-panel">
				<div class="event-header">
					<div class="event-date" id="event-date">Select a date</div>
					<i class="fas fa-calendar-alt event-icon" style="color: #95b8d1"></i>
				</div>

				<div class="event-list" id="event-list">
					<div class="no-events">
						Select a date to view events
					</div>
				</div>
			</div>
		</div>

		<script>
			document.addEventListener("DOMContentLoaded", () => {

  const monthYearEl = document.getElementById("month-year");
  const daysEl = document.getElementById("days");
  const eventDateEl = document.getElementById("event-date");
  const eventListEl = document.getElementById("event-list");

  const prevBtn = document.getElementById("prev-month");
  const nextBtn = document.getElementById("next-month");
  const todayBtn = document.getElementById("today-btn");
  const addBtn = document.getElementById("addBtn");

  let currentDate = new Date();
  let selectedDate = null;

  // LOAD EVENTS
  let events = JSON.parse(localStorage.getItem("events")) || {};

  function saveEvents() {
    localStorage.setItem("events", JSON.stringify(events));
  }

  function formatKey(date) {
    return `${date.getFullYear()}-${date.getMonth() + 1}-${date.getDate()}`;
  }

  function parseKey(key) {
    const [y, m, d] = key.split("-").map(Number);
    return new Date(y, m - 1, d);
  }

  function formatReadableDate(date) {
    return date.toLocaleDateString("en-US", {
      weekday: "long",
      year: "numeric",
      month: "long",
      day: "numeric"
    });
  }
  
  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const lastDate = new Date(year, month + 1, 0).getDate();

    const months = [
      "Jan","Feb","Mar","Apr","May","Jun",
      "Jul","Aug","Sep","Oct","Nov","Dec"
    ];

    monthYearEl.textContent = `${months[month]} ${year}`;

    let html = "";

    for (let i = 1; i <= lastDate; i++) {
      const date = new Date(year, month, i);
      const key = formatKey(date);

      let classes = "day";

      if (key === formatKey(new Date())) classes += " today";
      if (selectedDate && key === formatKey(selectedDate)) classes += " selected";
      if (events[key]) classes += " has-events";

      html += `<div class="${classes}" data-key="${key}">${i}</div>`;
    }

    daysEl.innerHTML = html;
  }

  function showEvents(dateKey) {
    const dateObj = parseKey(dateKey);
    eventDateEl.textContent = formatReadableDate(dateObj);

    eventListEl.innerHTML = "";

    if (!events[dateKey] || events[dateKey].length === 0) {
      eventListEl.innerHTML = `<div class="event-item">No events</div>`;
      return;
    }

    events[dateKey].forEach((ev) => {
      eventListEl.innerHTML += `
        <div class="event-item" data-id="${ev.id}" data-key="${dateKey}">

          <div class="event-content">
            <b>${ev.time}</b> - ${ev.text}
          </div>

          <div class="event-actions">
            <button class="open-btn">Open</button>
            <button class="delete-btn">Delete</button>
          </div>

        </div>
      `;
    });
  }

  function openEvent(id) {
    localStorage.setItem("selectedEventId", id);
    window.location.href = "salideets.html";
  }

  function deleteEvent(dateKey, id) {
    events[dateKey] = events[dateKey].filter(ev => ev.id !== id);

    if (events[dateKey].length === 0) {
      delete events[dateKey];
    }

    saveEvents();
    renderCalendar();
    showEvents(dateKey);
  }

  eventListEl.addEventListener("click", (e) => {

    const item = e.target.closest(".event-item");
    if (!item) return;

    const id = item.dataset.id;
    const dateKey = item.dataset.key;

    if (e.target.classList.contains("delete-btn")) {
      deleteEvent(dateKey, id);
      return;
    }

    if (e.target.classList.contains("open-btn")) {
      openEvent(id);
      return;
    }

  });

  daysEl.addEventListener("click", (e) => {
    const day = e.target.closest(".day");
    if (!day) return;

    const key = day.dataset.key;
    selectedDate = parseKey(key);

    renderCalendar();
    showEvents(key);
  });

  addBtn.addEventListener("click", () => {
  if (!selectedDate) {
    alert("Select a date first");
    return;
  }

  localStorage.setItem("selectedDate", formatKey(selectedDate));

  window.location.href = "saliadd.html";
});

  prevBtn.onclick = () => {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
  };

  nextBtn.onclick = () => {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
  };

  todayBtn.onclick = () => {
    currentDate = new Date();
    selectedDate = new Date();
    renderCalendar();
  };

  renderCalendar();
});
		</script>
</body>
</html>
