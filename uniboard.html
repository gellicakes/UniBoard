<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>UniBoard</title>

		<link rel="stylesheet" href="uniboard.css">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	</head>

	<body>

		<div class="header">
	  		<h1>UniBoard</h1>
	  		<p>College of Computing Studies</p>
	  		<div class="nav">
	    		<button>Department</button>
	    		<button>Program</button>
	    		<button>Section</button>
	  		</div>
		</div>

		<div class="containers-header">
 			<div class="top-bar">
	    		<h1 style="color: #5e6472;">Section Announcement</h1>
    			<button id="addBtn" class="add-btn">Add Post</button>
  			</div>
				<p style="color: #919191;">
    				Quizzes, activities, projects, and exams for your section
  				</p>
		</div>

		<div class="containers">
			<div class="calendar-container">
				<div class="calendar-header">
					<div class="nav-buttons">
						<button class="nav-btn" id="prev-month">
							<i class="fas fa-chevron-left"></i>
						</button>
						<button class="nav-btn" id="next-month">
							<i class="fas fa-chevron-right"></i>
						</button>
					</div>

					<div class="month-year" id="month-year"></div>

				</div>

				<div class="weekdays">
					<div class="weekday">Sun</div>
					<div class="weekday">Mon</div>
					<div class="weekday">Tue</div>
					<div class="weekday">Wed</div>
					<div class="weekday">Thu</div>
					<div class="weekday">Fri</div>
					<div class="weekday">Sat</div>
				</div>

				<div class="days" id="days"></div>

				<div class="calendar-footer">
					<button class="today-btn" id="today-btn">
						<i class="fas fa-calendar-day"></i> Today
					</button>

					<div class="event-indicator">
						<i class="fas fa-heart"></i>
						<span>Has events</span>
					</div>
				</div>
			</div>

			<div class="event-panel" id="event-panel">
				<div class="event-header">
					<div class="event-date" id="event-date">Select a date</div>
					<i class="fas fa-calendar-alt event-icon" style="color: #95b8d1"></i>
				</div>

				<div class="event-list" id="event-list">
					<div class="no-events">
						Select a date to view events
					</div>
				</div>
			</div>
		</div>

		<script src="uniboard.js"></script>

	</body>
</html>
