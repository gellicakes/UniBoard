<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>UniBoard</title>

	<style>
		body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f3f3f3;
}

.header {
  background: #142d4c;
  color: white;
  padding: 20px;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 1000;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.header h1 {
  margin: 0;
}

.header p {
  margin: 0;
}

.nav {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}

.nav button {
  background: #2f4b7c;
  border: none;
  color: white;
  padding: 8px 15px;
  margin-right: 5px;
  border-radius: 8px;
  cursor: pointer;
}

.containers {
  padding: 20px;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto 10px auto;
} 

.containers p {
  margin-top: 0px;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.top-bar h1 {
  margin: 0;
}

.event-container {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  margin-top: 0;
  margin-bottom: 20px;
}

.event-card {
  background: white;
  padding: 40px;
  border-radius: 15px;
  width: 600px;
  min-height: 300px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
  margin-top: 0;
}

.event-card h1 {
  margin: 0;
  color: #142d4c;
}

.event-details {
  background: #f7f9fc;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
}

#comments {
  margin-top: 20px;
}

.comment-box {
  background: white;
  border: 1px solid #dcdcdc;
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 10px;
  width: 500px;
}

.comment-box button {
  margin-right: 5px;
  margin-top: 5px;
  background: #61a5c2;
}

.comment-box button:first-of-type {
  background: #a9d6e5;
}

.comments-section {
  width: 600px;
  margin: 20px auto;
}

#input {
  width: 500px;
  height: 80px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
  resize: none;
  font-size: 14px;
}

.reply-box {
  background: #eef2ff;
  border-left: 4px solid #2f4b7c;
  padding: 10px;
  margin-top: 8px;
  margin-left: 30px;
  border-radius: 8px;
}
	</style>
</head>
<body>
	<div class="header">
        <h1>UniBoard</h1>
        <p>College of Computing Studies</p>
        <div class="nav">
          <button>Department</button>
          <button>Program</button>
          <a href="salisali.html">
          <button>Section</button>
          </a>
        </div>
    </div>

      <div class="containers">
      <div class="top-bar">
          <h1 style="color: #5e6472;">Section Announcement</h1>
      </div>
          <p style="color: #919191;">Quizzes, activities, projects, and exams for your section</p>
    </div>

    <div class="event-container">
      <div class="event-card">
        <h1 id="title" style="text-align: center;"></h1>
        <p id="time" style="text-align: center;"></p>

        <div class="event-details">
          <p id="details" style="text-align:center;"></p>
        </div>

      </div>
    </div>

    <hr>

    <div class="comments-section">
      <h3>Comments</h3>

      <div id="comments"></div>

        <textarea id="input"></textarea>
        <button onclick="addComment()" style="background: #8da9c4;">Post</button>
    </div>

    <script>
    	let events = JSON.parse(localStorage.getItem("events")) || {};
let selectedId = localStorage.getItem("selectedEventId");

let eventObj;

for (let key in events) {
  let found = events[key].find(e => e.id === selectedId);
  if (found) {
    eventObj = found;
    break;
  }
}

document.getElementById("title").textContent = eventObj.text;
document.getElementById("time").textContent = eventObj.time;
document.getElementById("details").textContent = eventObj.details || "No details";

function render() {
  document.getElementById("comments").innerHTML =
    (eventObj.comments || []).map((c, index) => `
      <div class="comment-box">
        <p>${c.text}</p>

        <button onclick="showReplyBox(${index})">Reply</button>
        <button onclick="deleteComment(${index})">Delete</button>

        <div id="replyBox-${index}" style="display:none; margin-top:10px;">
          <textarea id="replyInput-${index}"></textarea>
          <button onclick="addReply(${index})">Post Reply</button>
        </div>

        <div class="replies">
          ${(c.replies || []).map(r => `
            <div class="reply-box">${r}</div>
          `).join("")}
        </div>
      </div>
    `).join("");
}

function addComment() {
  let text = document.getElementById("input").value;

  if (!eventObj.comments) eventObj.comments = [];

  eventObj.comments.push({
  text: text,
  replies: []
});

  localStorage.setItem("events", JSON.stringify(events));

  render();

  document.getElementById("input").value = "";
}

function showReplyBox(index) {
  let box = document.getElementById(`replyBox-${index}`);

  if (box.style.display === "none") {
    box.style.display = "block";
  } else {
    box.style.display = "none";
  }
}

function addReply(index) {
  let input = document.getElementById(`replyInput-${index}`);
  let text = input.value;

  if (!eventObj.comments[index].replies) {
    eventObj.comments[index].replies = [];
  }

  eventObj.comments[index].replies.push(text);

  localStorage.setItem("events", JSON.stringify(events));

  render();
}

function deleteComment(index) {
  eventObj.comments.splice(index, 1);

  localStorage.setItem("events", JSON.stringify(events));

  render();
}
  
render();
    </script>
</body>
</html>
